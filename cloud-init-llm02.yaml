#cloud-config
# llm02 — Small/Medium/Vision LLM server: 3 models on 4x A100 80GB
#   GPU 0 (dedicated): small-llm (port ${small_llm_port}) — 128K ctx, speculative decoding
#   GPU 1+3 (TP=2):    medium-llm (port ${medium_llm_port}) — 256K ctx
#   GPU 2 (dedicated):  vision-llm (port ${vision_llm_port}) — multimodal
package_upgrade: true
write_files:
- path: /etc/needrestart/conf.d/99-cloud-init.conf
  content: |
    $nrconf{restart} = 'a';
    $nrconf{kernelhints} = 0;
- path: /etc/modprobe.d/nouveau-blacklist.conf
  content: |
    blacklist nouveau
    options nouveau modeset=0
- path: /etc/sysctl.d/99-vllm.conf
  permissions: '0644'
  content: |
    # === vLLM Dedicated Inference Server Tuning ===
    kernel.numa_balancing = 0
    vm.swappiness = 0
    vm.overcommit_memory = 1
    vm.max_map_count = 1000000
    vm.nr_hugepages = 16384
    vm.dirty_ratio = 80
    vm.dirty_background_ratio = 5
    vm.dirty_expire_centisecs = 3000
    vm.dirty_writeback_centisecs = 500
    vm.vfs_cache_pressure = 50
    vm.zone_reclaim_mode = 0
    net.core.rmem_max = 268435456
    net.core.wmem_max = 268435456
    net.core.rmem_default = 67108864
    net.core.wmem_default = 67108864
    net.ipv4.tcp_rmem = 4096 87380 134217728
    net.ipv4.tcp_wmem = 4096 65536 134217728
    net.core.somaxconn = 65535
    net.core.netdev_max_backlog = 65535
    net.ipv4.tcp_max_syn_backlog = 65535
    net.ipv4.tcp_fin_timeout = 15
    net.ipv4.tcp_tw_reuse = 1
    net.ipv4.ip_local_port_range = 1024 65535
    net.ipv4.tcp_fastopen = 3
    net.ipv4.tcp_slow_start_after_idle = 0
    net.ipv4.tcp_mtu_probing = 1
    net.ipv4.tcp_timestamps = 1
    fs.file-max = 2097152
    fs.nr_open = 2097152
- path: /etc/systemd/system/vllm-thp.service
  content: |
    [Unit]
    Description=Set THP to madvise for vLLM
    After=sysinit.target
    [Service]
    Type=oneshot
    ExecStart=/bin/bash -c 'echo madvise > /sys/kernel/mm/transparent_hugepage/enabled; echo madvise > /sys/kernel/mm/transparent_hugepage/defrag'
    RemainAfterExit=yes
    [Install]
    WantedBy=multi-user.target
- path: /etc/systemd/system/vllm-io.service
  content: |
    [Unit]
    Description=I/O tuning for vLLM inference
    After=sysinit.target
    [Service]
    Type=oneshot
    ExecStart=/bin/bash -c 'for d in /sys/block/sd*/queue/read_ahead_kb /sys/block/nvme*/queue/read_ahead_kb; do echo 2048 > $d 2>/dev/null; done'
    RemainAfterExit=yes
    [Install]
    WantedBy=multi-user.target
- path: /opt/setup-gpu.sh
  permissions: '0755'
  content: |
    #!/bin/bash
    set -euo pipefail
    exec > /var/log/gpu-setup.log 2>&1
    CLOUD_INIT_VERSION="2026-04-07-v9-phi-optimized"
    echo "Cloud-init version: $CLOUD_INIT_VERSION"
    export DEBIAN_FRONTEND=noninteractive
    export NEEDRESTART_MODE=a

    echo "=== Sub-Agent GPU Server Setup Started: $(date) ==="

    # ---- Wait for apt/dpkg locks ----
    wait_for_apt() {
        local max_wait=600 waited=0
        while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
              fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || \
              fuser /var/cache/apt/archives/lock >/dev/null 2>&1; do
            if (( waited >= max_wait )); then echo "ERROR: apt locks not released after $${max_wait}s"; return 1; fi
            echo "Waiting for apt locks... ($${waited}s)"; sleep 10; waited=$((waited + 10))
        done
    }

    # ---- Disable unattended-upgrades ----
    systemctl stop unattended-upgrades.service 2>/dev/null || true
    systemctl disable unattended-upgrades.service 2>/dev/null || true
    wait_for_apt
    apt-get remove -y unattended-upgrades 2>/dev/null || true

    # ---- System packages (minimal) ----
    wait_for_apt
    apt-get update -y
    apt-get install -y build-essential python3-pip python3-venv git curl wget jq htop tmux

    # ---- Disable unnecessary services ----
    systemctl disable --now snapd.service snapd.socket 2>/dev/null || true
    systemctl disable --now accounts-daemon.service 2>/dev/null || true
    systemctl disable --now apport.service 2>/dev/null || true
    systemctl disable --now motd-news.timer 2>/dev/null || true
    systemctl disable --now fwupd.service 2>/dev/null || true
    systemctl mask sleep.target suspend.target hibernate.target hybrid-sleep.target 2>/dev/null || true

    # ---- OS tuning (immediate) ----
    echo 0 > /proc/sys/kernel/numa_balancing
    echo madvise > /sys/kernel/mm/transparent_hugepage/enabled
    echo madvise > /sys/kernel/mm/transparent_hugepage/defrag
    echo 16384 > /proc/sys/vm/nr_hugepages
    sysctl --system
    for dev in /sys/block/sd*/queue/read_ahead_kb; do echo 2048 > "$dev" 2>/dev/null || true; done
    systemctl enable vllm-thp.service vllm-io.service 2>/dev/null || true

    # ---- GRUB boot params ----
    sed -i 's/^GRUB_CMDLINE_LINUX_DEFAULT=.*/GRUB_CMDLINE_LINUX_DEFAULT="quiet splash iommu=pt hugepagesz=2M hugepages=16384 transparent_hugepage=madvise processor.max_cstate=1 intel_idle.max_cstate=0"/' /etc/default/grub
    update-grub 2>/dev/null || true

    # ---- NVIDIA CUDA 12.8 ----
    wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
    dpkg -i cuda-keyring_1.1-1_all.deb
    apt-get update
    apt-get install -y -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" \
      cuda-drivers cuda-toolkit-12-8

    # ---- Python venv + vLLM nightly ----
    python3 -m venv /opt/vllm-env
    /opt/vllm-env/bin/pip install --upgrade pip
    curl -LsSf https://astral.sh/uv/install.sh | sh
    export PATH="/root/.local/bin:$PATH"
    uv pip install --python /opt/vllm-env/bin/python -U vllm --pre \
      --extra-index-url https://wheels.vllm.ai/nightly/cu129 \
      --extra-index-url https://download.pytorch.org/whl/cu129 \
      --index-strategy unsafe-best-match
    uv pip install --python /opt/vllm-env/bin/python transformers==5.5.0
    uv pip install --python /opt/vllm-env/bin/python qwen-vl-utils 2>/dev/null || true

    # ---- HuggingFace token ----
    mkdir -p /home/${admin_username}/.cache/huggingface
    echo "${hf_token}" > /home/${admin_username}/.cache/huggingface/token
    chmod 600 /home/${admin_username}/.cache/huggingface/token
    chown -R ${admin_username}:${admin_username} /home/${admin_username}/.cache

    # ======================================================================
    # Model 1: small-llm (port ${small_llm_port}) — GitHub operations sub-agent
    # Dedicated GPU ${small_llm_cuda_devices}, 128K ctx, speculative decoding, compile level ${small_llm_vllm_compile_level}
    # ======================================================================
    cat > /usr/local/bin/start-vllm-phi <<'SCRIPT'
    #!/bin/bash
    echo "Starting vLLM: ${small_llm_model_id} (TP=1, ${small_llm_max_model_len} ctx, port ${small_llm_port}, GPU ${small_llm_cuda_devices})..."
    export HF_TOKEN="$${HF_TOKEN:-$(cat /home/${admin_username}/.cache/huggingface/token 2>/dev/null)}"
    exec /opt/vllm-env/bin/python -m vllm.entrypoints.openai.api_server \
      --model ${small_llm_model_id} \
      --served-model-name ${small_llm_served_name} \
      --tensor-parallel-size 1 \
      --max-model-len ${small_llm_max_model_len} \
      --gpu-memory-utilization ${small_llm_gpu_memory_utilization} \
      --enable-auto-tool-choice \
      --tool-call-parser ${small_llm_tool_call_parser} \
%{ if small_llm_speculative_model == "" ~}
      --async-scheduling \
%{ endif ~}
      --enable-prefix-caching \
%{ if small_llm_enable_chunked_prefill ~}
      --enable-chunked-prefill \
%{ endif ~}
%{ if small_llm_speculative_model != "" ~}
      --speculative-config '{"method": "ngram", "num_speculative_tokens": ${small_llm_num_speculative_tokens}, "prompt_lookup_min": ${small_llm_ngram_prompt_lookup_min}, "prompt_lookup_max": ${small_llm_ngram_prompt_lookup_max}}' \
%{ endif ~}
%{ if small_llm_vllm_compile_level > 0 ~}
      --optimization-level ${small_llm_vllm_compile_level} \
%{ endif ~}
      --no-enable-log-requests \
      --disable-log-stats \
      --max-num-seqs 256 \
      --host 0.0.0.0 \
      --port ${small_llm_port}
    SCRIPT
    chmod +x /usr/local/bin/start-vllm-phi

    cat > /etc/systemd/system/vllm-phi.service <<'SYSTEMD'
    [Unit]
    Description=vLLM ${small_llm_served_name} GitHub Ops Sub-Agent (port ${small_llm_port}, GPU ${small_llm_cuda_devices}, 128K ctx)
    After=network.target nvidia-persistenced.service vllm-thp.service
    Wants=nvidia-persistenced.service vllm-thp.service

    [Service]
    Type=simple
    User=${admin_username}
    Environment=HF_TOKEN=${hf_token}
    Environment=CUDA_VISIBLE_DEVICES=${small_llm_cuda_devices}
    Environment=VLLM_ATTENTION_BACKEND=FLASH_ATTN
    Environment=VLLM_USE_V1=1
    Environment=OMP_NUM_THREADS=1
    Environment=CUDA_DEVICE_MAX_CONNECTIONS=1
    ExecStart=/usr/local/bin/start-vllm-phi
    Restart=on-failure
    RestartSec=30
    LimitNOFILE=2097152
    LimitMEMLOCK=infinity
    TimeoutStartSec=600

    [Install]
    WantedBy=multi-user.target
    SYSTEMD

    # ======================================================================
    # Model 2: vision-llm (port ${vision_llm_port}) — vision/multimodal
    # Dedicated GPU ${vision_llm_cuda_devices}
    # ======================================================================
    cat > /usr/local/bin/start-vllm-qwenvl <<'SCRIPT'
    #!/bin/bash
    echo "Starting vLLM: ${vision_llm_model_id} (TP=1, ${vision_llm_max_model_len} ctx, port ${vision_llm_port}, GPU ${vision_llm_cuda_devices})..."
    export HF_TOKEN="$${HF_TOKEN:-$(cat /home/${admin_username}/.cache/huggingface/token 2>/dev/null)}"
    exec /opt/vllm-env/bin/python -m vllm.entrypoints.openai.api_server \
      --model ${vision_llm_model_id} \
      --served-model-name ${vision_llm_served_name} \
      --tensor-parallel-size 1 \
      --max-model-len ${vision_llm_max_model_len} \
      --gpu-memory-utilization ${vision_llm_gpu_memory_utilization} \
      --enable-auto-tool-choice \
      --tool-call-parser hermes \
      --async-scheduling \
      --enable-prefix-caching \
      --enable-chunked-prefill \
      --no-enable-log-requests \
      --disable-log-stats \
      --limit-mm-per-prompt '{"image": 4, "video": 0}' \
      --host 0.0.0.0 \
      --port ${vision_llm_port}
    SCRIPT
    chmod +x /usr/local/bin/start-vllm-qwenvl

    cat > /etc/systemd/system/vllm-qwenvl.service <<'SYSTEMD'
    [Unit]
    Description=vLLM ${vision_llm_served_name} Vision/Multimodal (port ${vision_llm_port}, GPU ${vision_llm_cuda_devices})
    After=network.target nvidia-persistenced.service vllm-thp.service
    Wants=nvidia-persistenced.service vllm-thp.service

    [Service]
    Type=simple
    User=${admin_username}
    Environment=HF_TOKEN=${hf_token}
    Environment=CUDA_VISIBLE_DEVICES=${vision_llm_cuda_devices}
    Environment=VLLM_ATTENTION_BACKEND=FLASH_ATTN
    Environment=VLLM_USE_V1=1
    Environment=OMP_NUM_THREADS=1
    Environment=CUDA_DEVICE_MAX_CONNECTIONS=1
    ExecStartPre=/bin/sleep 30
    ExecStart=/usr/local/bin/start-vllm-qwenvl
    Restart=on-failure
    RestartSec=30
    LimitNOFILE=2097152
    LimitMEMLOCK=infinity
    TimeoutStartSec=600

    [Install]
    WantedBy=multi-user.target
    SYSTEMD

    # ======================================================================
    # Model 3: medium-llm (port ${medium_llm_port}) — coding agent / tool calling / API orchestration
    # TP=${medium_llm_tp_size} across GPU ${medium_llm_cuda_devices} — 256K context
    # ======================================================================
    cat > /usr/local/bin/start-vllm-devstral <<'SCRIPT'
    #!/bin/bash
    echo "Starting vLLM: ${medium_llm_model_id} (TP=${medium_llm_tp_size}, ${medium_llm_max_model_len} ctx, port ${medium_llm_port}, GPU ${medium_llm_cuda_devices})..."
    export HF_TOKEN="$${HF_TOKEN:-$(cat /home/${admin_username}/.cache/huggingface/token 2>/dev/null)}"
    exec /opt/vllm-env/bin/python -m vllm.entrypoints.openai.api_server \
      --model ${medium_llm_model_id} \
      --served-model-name ${medium_llm_served_name} \
      --tensor-parallel-size ${medium_llm_tp_size} \
      --max-model-len ${medium_llm_max_model_len} \
      --gpu-memory-utilization ${medium_llm_gpu_memory_utilization} \
      --enable-auto-tool-choice \
      --tool-call-parser mistral \
      --chat-template-content-format string \
      --async-scheduling \
      --enable-prefix-caching \
      --enable-chunked-prefill \
      --no-enable-log-requests \
      --disable-log-stats \
      --host 0.0.0.0 \
      --port ${medium_llm_port}
    SCRIPT
    chmod +x /usr/local/bin/start-vllm-devstral

    cat > /etc/systemd/system/vllm-devstral.service <<'SYSTEMD'
    [Unit]
    Description=vLLM ${medium_llm_served_name} Coding Agent / Tool Calling (port ${medium_llm_port}, GPU ${medium_llm_cuda_devices} TP=${medium_llm_tp_size} 256K)
    After=network.target nvidia-persistenced.service vllm-phi.service
    Wants=nvidia-persistenced.service

    [Service]
    Type=simple
    User=${admin_username}
    Environment=HF_TOKEN=${hf_token}
    Environment=CUDA_VISIBLE_DEVICES=${medium_llm_cuda_devices}
    Environment=VLLM_ATTENTION_BACKEND=FLASH_ATTN
    Environment=VLLM_USE_V1=1
    Environment=OMP_NUM_THREADS=1
    Environment=CUDA_DEVICE_MAX_CONNECTIONS=1
    ExecStartPre=/bin/sleep 30
    ExecStart=/usr/local/bin/start-vllm-devstral
    Restart=on-failure
    RestartSec=30
    LimitNOFILE=2097152
    LimitMEMLOCK=infinity
    TimeoutStartSec=600

    [Install]
    WantedBy=multi-user.target
    SYSTEMD

    # ---- Health check ----
    cat > /usr/local/bin/check-vllm <<'SCRIPT'
    #!/bin/bash
    echo "=== Sub-Agent Server Health Check ==="
    echo -n "Phi      (GPU ${small_llm_cuda_devices}, :${small_llm_port}):     "; curl -sf http://localhost:${small_llm_port}/health && echo "OK" || echo "DOWN"
    echo -n "Qwen VL  (GPU ${vision_llm_cuda_devices}, :${vision_llm_port}):     "; curl -sf http://localhost:${vision_llm_port}/health && echo "OK" || echo "DOWN"
    echo -n "Devstral (GPU ${medium_llm_cuda_devices}, :${medium_llm_port}):  "; curl -sf http://localhost:${medium_llm_port}/health && echo "OK" || echo "DOWN"
    echo "=== GPU ==="
    nvidia-smi --query-gpu=index,name,memory.used,memory.total,temperature.gpu --format=csv,noheader
    SCRIPT
    chmod +x /usr/local/bin/check-vllm

    systemctl daemon-reload
    systemctl enable vllm-phi.service vllm-qwenvl.service vllm-devstral.service

    # ---- Journald retention ----
    mkdir -p /etc/systemd/journald.conf.d
    cat > /etc/systemd/journald.conf.d/vllm.conf <<'JOURNAL'
    [Journal]
    SystemMaxUse=500M
    MaxRetentionSec=7day
    JOURNAL
    systemctl restart systemd-journald

    echo "=== Sub-Agent GPU Server Setup Completed: $(date) ==="
    echo "Services: vllm-phi (:${small_llm_port}), vllm-qwenvl (:${vision_llm_port}), vllm-devstral (:${medium_llm_port})"
    echo "Commands: start-vllm-phi, start-vllm-qwenvl, start-vllm-devstral, check-vllm"
runcmd:
- chown ${admin_username}:${admin_username} /home/${admin_username}
- bash /opt/setup-gpu.sh
- reboot
