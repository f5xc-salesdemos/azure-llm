#cloud-config
write_files:
- path: /etc/needrestart/conf.d/99-cloud-init.conf
  content: '$nrconf{restart} = ''a'';

    $nrconf{kernelhints} = 0;

    '
- path: /etc/modprobe.d/nouveau-blacklist.conf
  content: 'blacklist nouveau

    options nouveau modeset=0

    '
- path: /home/azureuser/benchmarks/prompts.json
  permissions: '0644'
  content: "[\n  {\n    \"id\": \"simple_qa\",\n    \"max_tokens\": 50,\n    \"messages\": [\n      {\"role\": \"user\", \"content\": \"What is the capital of France and what is its population?\"}\n   \
    \ ]\n  },\n  {\n    \"id\": \"code_generation\",\n    \"max_tokens\": 300,\n    \"messages\": [\n      {\"role\": \"user\", \"content\": \"Write a Python function that implements binary search on a\
    \ sorted list. Include type hints and handle edge cases like empty lists.\"}\n    ]\n  },\n  {\n    \"id\": \"reasoning\",\n    \"max_tokens\": 200,\n    \"messages\": [\n      {\"role\": \"user\",\
    \ \"content\": \"A farmer has 17 sheep. All but 9 die. How many sheep are left? Explain your reasoning step by step.\"}\n    ]\n  },\n  {\n    \"id\": \"creative_writing\",\n    \"max_tokens\": 250,\n\
    \    \"messages\": [\n      {\"role\": \"user\", \"content\": \"Write an opening paragraph for a science fiction story about the first human colony on Europa discovering something unexpected beneath\
    \ the ice.\"}\n    ]\n  },\n  {\n    \"id\": \"summarization\",\n    \"max_tokens\": 100,\n    \"messages\": [\n      {\"role\": \"user\", \"content\": \"Summarize the following in exactly 2 sentences:\
    \ The Industrial Revolution, which began in Britain in the late 18th century, fundamentally transformed economies from agrarian to industrial. It introduced mechanized manufacturing, leading to urbanization\
    \ as workers moved from rural areas to cities for factory jobs. This period saw innovations like the steam engine, spinning jenny, and power loom, which dramatically increased production capacity. While\
    \ it created unprecedented wealth and economic growth, it also led to poor working conditions, child labor, and significant environmental pollution that would take centuries to address.\"}\n    ]\n\
    \  },\n  {\n    \"id\": \"technical_explanation\",\n    \"max_tokens\": 300,\n    \"messages\": [\n      {\"role\": \"user\", \"content\": \"Explain the TCP three-way handshake process in detail, including\
    \ what happens at each step and why it is necessary for reliable communication.\"}\n    ]\n  },\n  {\n    \"id\": \"translation\",\n    \"max_tokens\": 200,\n    \"messages\": [\n      {\"role\": \"\
    user\", \"content\": \"Translate the following English text to Spanish, maintaining the formal tone: 'We are pleased to announce that our company has achieved record revenue this quarter. Our dedicated\
    \ team of engineers and designers have worked tirelessly to deliver innovative products that exceed customer expectations.'\"}\n    ]\n  },\n  {\n    \"id\": \"math_problem\",\n    \"max_tokens\": 250,\n\
    \    \"messages\": [\n      {\"role\": \"user\", \"content\": \"A train travels from City A to City B at 60 km/h and returns at 40 km/h. If the total journey takes 5 hours, what is the distance between\
    \ the two cities? Show your work.\"}\n    ]\n  },\n  {\n    \"id\": \"long_analysis\",\n    \"max_tokens\": 500,\n    \"messages\": [\n      {\"role\": \"user\", \"content\": \"Analyze the pros and\
    \ cons of microservices architecture versus monolithic architecture for a startup building a SaaS product. Consider factors like development speed, scalability, operational complexity, and team size.\"\
    }\n    ]\n  },\n  {\n    \"id\": \"multi_turn\",\n    \"max_tokens\": 200,\n    \"messages\": [\n      {\"role\": \"system\", \"content\": \"You are a helpful database administrator.\"},\n      {\"\
    role\": \"user\", \"content\": \"My PostgreSQL query is running slow on a table with 50 million rows.\"},\n      {\"role\": \"assistant\", \"content\": \"There are several things to check. First, do\
    \ you have appropriate indexes on the columns used in your WHERE clause and JOIN conditions?\"},\n      {\"role\": \"user\", \"content\": \"I have a B-tree index on the primary key but the query filters\
    \ on a timestamp column and a status enum. What indexes should I add?\"}\n    ]\n  }\n]\n"
- path: /home/azureuser/benchmarks/requirements.txt
  permissions: '0644'
  content: 'aiohttp>=3.9

    tabulate>=0.9

    '
- path: /home/azureuser/benchmarks/benchmark_client.py
  permissions: '0755'
  encoding: b64
  content: 
- path: /home/azureuser/benchmarks/run_orchestrator.sh
  permissions: '0755'
  encoding: b64
  content: 
- path: /opt/setup-gpu.sh
  permissions: '0755'
  content: "#!/bin/bash\nset -euo pipefail\nexec > /var/log/gpu-setup.log 2>&1\nCLOUD_INIT_VERSION=\"2026-04-06-v3-a100-bfcl\"\necho \"Cloud-init version: $CLOUD_INIT_VERSION\"\nexport DEBIAN_FRONTEND=noninteractive\n\
    export NEEDRESTART_MODE=a\n\necho \"=== GPU Setup Started: $(date) ===\"\n\n# ---- Wait for apt/dpkg locks ----\nwait_for_apt() {\n    local max_wait=600\n    local waited=0\n    while fuser /var/lib/dpkg/lock-frontend\
    \ >/dev/null 2>&1 || \\\n          fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || \\\n          fuser /var/cache/apt/archives/lock >/dev/null 2>&1; do\n        if (( waited >= max_wait )); then\n\
    \            echo \"ERROR: apt locks not released after ${max_wait}s\"\n            return 1\n        fi\n        echo \"Waiting for apt locks... (${waited}s)\"\n        sleep 10\n        waited=$((waited\
    \ + 10))\n    done\n    echo \"apt locks are free\"\n}\n\n# ---- Disable unattended-upgrades ----\nsystemctl stop unattended-upgrades.service 2>/dev/null || true\nsystemctl disable unattended-upgrades.service\
    \ 2>/dev/null || true\nwait_for_apt\napt-get remove -y unattended-upgrades 2>/dev/null || true\n\n# ---- System update ----\nwait_for_apt\napt-get update -y\napt-get upgrade -y -o Dpkg::Options::=\"\
    --force-confdef\" -o Dpkg::Options::=\"--force-confold\"\n\n# ---- Install system packages (moved from cloud-init packages: to avoid lock races) ----\napt-get install -y build-essential python3-pip\
    \ python3-venv python3-venv \\\n  git curl wget jq htop tmux\n\n# ---- NVIDIA CUDA keyring ----\nwget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb\n\
    dpkg -i cuda-keyring_1.1-1_all.deb\napt-get update\n\n# ---- NVIDIA driver and CUDA toolkit ----\napt-get install -y -o Dpkg::Options::=\"--force-confdef\" -o Dpkg::Options::=\"--force-confold\" \\\n\
    \  cuda-drivers cuda-toolkit-12-8\n\n# ---- NVIDIA Container Toolkit ----\ncurl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \\\n  | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg\n\
    curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \\\n  | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg]\
    \ https://#g' \\\n  | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list\napt-get update\napt-get install -y nvidia-container-toolkit\n\n# ---- Ollama ----\ncurl -fsSL https://ollama.com/install.sh\
    \ | sh\n\n# ---- Python venv + vLLM ----\napt-get install -y python3-venv python3-venv 2>/dev/null || true\npython3 -m venv /opt/vllm-env\n/opt/vllm-env/bin/pip install --upgrade pip\n# Install uv (fast\
    \ package manager) + vLLM nightly (Gemma 4 + GLM support)\ncurl -LsSf https://astral.sh/uv/install.sh | sh\nexport PATH=\"/root/.local/bin:$PATH\"\nuv pip install --python /opt/vllm-env/bin/python -U\
    \ vllm --pre \\\n  --extra-index-url https://wheels.vllm.ai/nightly/cu129 \\\n  --extra-index-url https://download.pytorch.org/whl/cu129 \\\n  --index-strategy unsafe-best-match\nuv pip install --python\
    \ /opt/vllm-env/bin/python transformers==5.5.0\n/opt/vllm-env/bin/pip install aiohttp tabulate\n\n# ---- Node.js 20 LTS + Claude Code CLI ----\ncurl -fsSL https://deb.nodesource.com/setup_20.x | bash\
    \ -\napt-get install -y nodejs\nnpm install -g @anthropic-ai/claude-code\n\n# ---- Agentic Benchmarks: tau-bench ----\ncd /opt\ngit clone https://github.com/sierra-research/tau2-bench.git /opt/tau-bench\
    \ 2>/dev/null || true\nif [ -d /opt/tau-bench ]; then\n    cd /opt/tau-bench\n    /opt/vllm-env/bin/pip install -e . 2>/dev/null || /opt/vllm-env/bin/pip install -r requirements.txt 2>/dev/null || true\n\
    fi\n\n# ---- Agentic Benchmarks: BFCL (Berkeley Function Calling Leaderboard) ----\ngit clone https://github.com/ShishirPatil/gorilla.git /opt/bfcl 2>/dev/null || true\nif [ -d /opt/bfcl/berkeley-function-call-leaderboard\
    \ ]; then\n    cd /opt/bfcl/berkeley-function-call-leaderboard\n    /opt/vllm-env/bin/pip install -e . 2>/dev/null || /opt/vllm-env/bin/pip install -r requirements.txt 2>/dev/null || true\nfi\n\n# ----\
    \ Claude Code configuration for vLLM backend ----\nmkdir -p /home/azureuser/.claude\ncat > /home/azureuser/.claude/settings.json <<'CLAUDECONF'\n{\n  \"env\": {\n    \"ANTHROPIC_BASE_URL\": \"http://localhost:8000\"\
    ,\n    \"ANTHROPIC_API_KEY\": \"local-vllm\",\n    \"ANTHROPIC_AUTH_TOKEN\": \"local-vllm\"\n  }\n}\nCLAUDECONF\n\n# ---- Convenience scripts ----\ncat > /usr/local/bin/start-vllm-server <<'SCRIPT'\n\
    #!/bin/bash\nMODEL=\"${1:?Usage: start-vllm-server <model-id>  (e.g., Qwen/Qwen3-Coder-30B-A3B-Instruct-2507)}\"\nSERVED_NAME=\"${2:-$MODEL}\"\necho \"Starting vLLM server with $MODEL (A100 optimized)...\"\
    \n/opt/vllm-env/bin/python -m vllm.entrypoints.openai.api_server \\\n  --model \"$MODEL\" \\\n  --served-model-name \"$SERVED_NAME\" \\\n  --gpu-memory-utilization 0.90 \\\n  --max-model-len 16384 \\\
    \n  --enable-auto-tool-choice \\\n  --tool-call-parser hermes \\\n  --host 0.0.0.0 \\\n  --port 8000\nSCRIPT\nchmod +x /usr/local/bin/start-vllm-server\n\ncat > /usr/local/bin/start-ollama-model <<'SCRIPT'\n\
    #!/bin/bash\nMODEL=\"${1:?Usage: start-ollama-model <model-tag>  (e.g., llama3.3:70b, llama4:scout)}\"\necho \"Pulling and running $MODEL with Ollama...\"\nCUDA_VISIBLE_DEVICES=0 ollama pull \"$MODEL\"\
    \nCUDA_VISIBLE_DEVICES=0 ollama run \"$MODEL\"\nSCRIPT\nchmod +x /usr/local/bin/start-ollama-model\n\ncat > /usr/local/bin/start-claude-code <<'SCRIPT'\n#!/bin/bash\nMODEL=\"${1:-default}\"\necho \"\
    Starting Claude Code with vLLM backend...\"\necho \"Make sure vLLM is running on port 8000 (start-vllm-server <model>)\"\nexport ANTHROPIC_BASE_URL=http://localhost:8000\nexport ANTHROPIC_API_KEY=local-vllm\n\
    export ANTHROPIC_AUTH_TOKEN=local-vllm\nif [ \"$MODEL\" != \"default\" ]; then\n  export ANTHROPIC_DEFAULT_OPUS_MODEL=\"$MODEL\"\n  export ANTHROPIC_DEFAULT_SONNET_MODEL=\"$MODEL\"\n  export ANTHROPIC_DEFAULT_HAIKU_MODEL=\"\
    $MODEL\"\nfi\nexec claude\nSCRIPT\nchmod +x /usr/local/bin/start-claude-code\n\necho \"=== GPU Setup Completed: $(date) ===\"\n"
runcmd:
- chown azureuser:azureuser /home/azureuser
- chown -R azureuser:azureuser /home/azureuser/benchmarks
- mkdir -p /home/azureuser/benchmarks/results
- chown -R azureuser:azureuser /home/azureuser/benchmarks/results
- chown -R azureuser:azureuser /home/azureuser/.claude
- bash /opt/setup-gpu.sh
- reboot
