- path: /opt/setup-gpu.sh
  permissions: '0755'
  content: "#!/bin/bash\nset -euo pipefail\nexec > /var/log/gpu-setup.log 2>&1\nCLOUD_INIT_VERSION=\"2026-04-06-v4-gemma4-production\"\necho \"Cloud-init version: $CLOUD_INIT_VERSION\"\nexport DEBIAN_FRONTEND=noninteractive\n\
    export NEEDRESTART_MODE=a\n\necho \"=== GPU Setup Started: $(date) ===\"\n\n# ---- Wait for apt/dpkg locks ----\nwait_for_apt() {\n    local max_wait=600 waited=0\n    while fuser /var/lib/dpkg/lock-frontend\
    \ >/dev/null 2>&1 || \\\n          fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || \\\n          fuser /var/cache/apt/archives/lock >/dev/null 2>&1; do\n        if (( waited >= max_wait )); then echo\
    \ \"ERROR: apt locks not released after ${max_wait}s\"; return 1; fi\n        echo \"Waiting for apt locks... (${waited}s)\"; sleep 10; waited=$((waited + 10))\n    done\n}\n\n# ---- Disable unattended-upgrades\
    \ ----\nsystemctl stop unattended-upgrades.service 2>/dev/null || true\nsystemctl disable unattended-upgrades.service 2>/dev/null || true\nwait_for_apt\napt-get remove -y unattended-upgrades 2>/dev/null\
    \ || true\n\n# ---- System update + packages ----\nwait_for_apt\napt-get update -y\napt-get upgrade -y -o Dpkg::Options::=\"--force-confdef\" -o Dpkg::Options::=\"--force-confold\"\napt-get install\
    \ -y build-essential python3-pip python3-venv git curl wget jq htop tmux\n\n# ---- OS-level performance tuning ----\necho 0 > /proc/sys/kernel/numa_balancing\necho madvise > /sys/kernel/mm/transparent_hugepage/enabled\n\
    echo 16384 > /proc/sys/vm/nr_hugepages\n# Make persistent across reboots\ncat >> /etc/sysctl.d/99-vllm.conf <<'SYSCTL'\nkernel.numa_balancing = 0\nvm.nr_hugepages = 16384\nSYSCTL\necho 'echo madvise\
    \ > /sys/kernel/mm/transparent_hugepage/enabled' >> /etc/rc.local\nchmod +x /etc/rc.local 2>/dev/null || true\n\n# ---- NVIDIA CUDA ----\nwget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb\n\
    dpkg -i cuda-keyring_1.1-1_all.deb\napt-get update\napt-get install -y -o Dpkg::Options::=\"--force-confdef\" -o Dpkg::Options::=\"--force-confold\" \\\n  cuda-drivers cuda-toolkit-12-8\n\n# ---- NVIDIA\
    \ Container Toolkit ----\ncurl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \\\n  | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg\ncurl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list\
    \ \\\n  | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \\\n  | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list\napt-get update\n\
    apt-get install -y nvidia-container-toolkit\n\n# ---- Python venv + vLLM nightly + transformers 5.5.0 ----\npython3 -m venv /opt/vllm-env\n/opt/vllm-env/bin/pip install --upgrade pip\ncurl -LsSf https://astral.sh/uv/install.sh\
    \ | sh\nexport PATH=\"/root/.local/bin:$PATH\"\nuv pip install --python /opt/vllm-env/bin/python -U vllm --pre \\\n  --extra-index-url https://wheels.vllm.ai/nightly/cu129 \\\n  --extra-index-url https://download.pytorch.org/whl/cu129\
    \ \\\n  --index-strategy unsafe-best-match\nuv pip install --python /opt/vllm-env/bin/python transformers==5.5.0\n/opt/vllm-env/bin/pip install aiohttp tabulate\n\n# ---- Node.js 20 + Claude Code CLI\
    \ ----\ncurl -fsSL https://deb.nodesource.com/setup_20.x | bash -\napt-get install -y nodejs || (dpkg --configure -a && apt-get install -y -f nodejs)\nnpm install -g @anthropic-ai/claude-code\n\n# ----\
    \ Claude Code configuration ----\nmkdir -p /home/azureuser/.claude\ncat > /home/azureuser/.claude/settings.json <<'CLAUDECONF'\n{\n  \"env\": {\n    \"ANTHROPIC_BASE_URL\": \"http://localhost:8000\"\
    ,\n    \"ANTHROPIC_API_KEY\": \"local-vllm\",\n    \"ANTHROPIC_AUTH_TOKEN\": \"local-vllm\",\n    \"ANTHROPIC_DEFAULT_OPUS_MODEL\": \"gemma-4-31b\",\n    \"ANTHROPIC_DEFAULT_SONNET_MODEL\": \"gemma-4-31b\"\
    ,\n    \"ANTHROPIC_DEFAULT_HAIKU_MODEL\": \"gemma-4-31b\",\n    \"CLAUDE_CODE_ATTRIBUTION_HEADER\": \"0\"\n  }\n}\nCLAUDECONF\n\n# ---- Convenience scripts ----\n\n# Option 1: Native gemma4 tool parser\
    \ (try first)\ncat > /usr/local/bin/start-vllm-gemma4 <<'SCRIPT'\n#!/bin/bash\necho \"Starting vLLM with Gemma 4 31B (native gemma4 tool parser)...\"\necho \"This may take 5-10 minutes on first run\
    \ (downloading model)...\"\nexport HF_TOKEN=\"${HF_TOKEN:-}\"\nexec /opt/vllm-env/bin/python -m vllm.entrypoints.openai.api_server \\\n  --model google/gemma-4-31B-it \\\n  --served-model-name gemma-4-31b\
    \ \\\n  --tensor-parallel-size 2 \\\n  --max-model-len 131072 \\\n  --gpu-memory-utilization 0.95 \\\n  --enable-auto-tool-choice \\\n  --tool-call-parser gemma4 \\\n  --reasoning-parser gemma4 \\\n\
    \  --default-chat-template-kwargs '{\"enable_thinking\": true}' \\\n  --async-scheduling \\\n  --mm-processor-kwargs '{\"max_soft_tokens\": 560}' \\\n  --limit-mm-per-prompt image=4 \\\n  --host 0.0.0.0\
    \ \\\n  --port 8000\nSCRIPT\nchmod +x /usr/local/bin/start-vllm-gemma4\n\n# Option 2: Hermes tool parser (fallback if gemma4 parser is buggy)\ncat > /usr/local/bin/start-vllm-gemma4-hermes <<'SCRIPT'\n\
    #!/bin/bash\necho \"Starting vLLM with Gemma 4 31B (hermes tool parser fallback)...\"\necho \"This may take 5-10 minutes on first run (downloading model)...\"\nexport HF_TOKEN=\"${HF_TOKEN:-}\"\nexec\
    \ /opt/vllm-env/bin/python -m vllm.entrypoints.openai.api_server \\\n  --model google/gemma-4-31B-it \\\n  --served-model-name gemma-4-31b \\\n  --tensor-parallel-size 2 \\\n  --max-model-len 131072\
    \ \\\n  --gpu-memory-utilization 0.95 \\\n  --enable-auto-tool-choice \\\n  --tool-call-parser hermes \\\n  --async-scheduling \\\n  --mm-processor-kwargs '{\"max_soft_tokens\": 560}' \\\n  --limit-mm-per-prompt\
    \ image=4 \\\n  --host 0.0.0.0 \\\n  --port 8000\nSCRIPT\nchmod +x /usr/local/bin/start-vllm-gemma4-hermes\n\n# Claude Code launcher\ncat > /usr/local/bin/start-claude-code <<'SCRIPT'\n#!/bin/bash\n\
    echo \"Waiting for vLLM to be ready...\"\nfor i in $(seq 1 120); do\n  if curl -sf http://localhost:8000/health > /dev/null 2>&1; then\n    echo \"vLLM is ready. Launching Claude Code...\"\n    exec\
    \ claude\n  fi\n  sleep 5\ndone\necho \"ERROR: vLLM not ready after 10 minutes. Start it with: start-vllm-gemma4\"\nexit 1\nSCRIPT\nchmod +x /usr/local/bin/start-claude-code\n\n# ---- Systemd service\
    \ for auto-start vLLM ----\ncat > /etc/systemd/system/vllm-gemma4.service <<'SYSTEMD'\n[Unit]\nDescription=vLLM Gemma 4 31B Inference Server\nAfter=network.target nvidia-persistenced.service\n\n[Service]\n\
    Type=simple\nUser=azureuser\nEnvironment=HF_TOKEN=\nExecStart=/usr/local/bin/start-vllm-gemma4\nRestart=on-failure\nRestartSec=30\nLimitNOFILE=65536\nLimitMEMLOCK=infinity\n\n[Install]\nWantedBy=multi-user.target\n\
    SYSTEMD\nsystemctl daemon-reload\nsystemctl enable vllm-gemma4.service\n\necho \"=== GPU Setup Completed: $(date) ===\"\n"
- path: /home/azureuser/benchmarks/test-claude-code.sh
  permissions: '0755'
  content: "#!/bin/bash\n# Test vLLM + Claude Code configuration\necho \"=== Testing vLLM + Gemma 4 + Claude Code ===\"\n\n# Test 1: Health check\necho -n \"1. vLLM health check... \"\nif curl -sf http://localhost:8000/health\
    \ > /dev/null 2>&1; then\n    echo \"PASS\"\nelse\n    echo \"FAIL - vLLM not running. Start with: start-vllm-gemma4\"\n    exit 1\nfi\n\n# Test 2: Model loaded\necho -n \"2. Model loaded... \"\nMODELS=$(curl\
    \ -s http://localhost:8000/v1/models 2>/dev/null)\nif echo \"$MODELS\" | grep -q \"gemma-4-31b\"; then\n    echo \"PASS (gemma-4-31b)\"\nelse\n    echo \"FAIL - model not found\"\n    echo \"$MODELS\"\
    \n    exit 1\nfi\n\n# Test 3: Text generation\necho -n \"3. Text generation... \"\nRESP=$(curl -s http://localhost:8000/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"\
    model\":\"gemma-4-31b\",\"messages\":[{\"role\":\"user\",\"content\":\"Say hello in one word\"}],\"max_tokens\":10}' 2>/dev/null)\nif echo \"$RESP\" | grep -q \"choices\"; then\n    echo \"PASS\"\n\
    else\n    echo \"FAIL\"\n    echo \"$RESP\" | head -5\n    exit 1\nfi\n\n# Test 4: Tool calling\necho -n \"4. Tool calling... \"\nRESP=$(curl -s http://localhost:8000/v1/chat/completions \\\n  -H \"\
    Content-Type: application/json\" \\\n  -d '{\n    \"model\":\"gemma-4-31b\",\n    \"messages\":[{\"role\":\"user\",\"content\":\"What is 2+2? Use the calculator tool.\"}],\n    \"tools\":[{\"type\"\
    :\"function\",\"function\":{\"name\":\"calculator\",\"description\":\"Calculate math\",\"parameters\":{\"type\":\"object\",\"properties\":{\"expression\":{\"type\":\"string\"}}}}}],\n    \"max_tokens\"\
    :100\n  }' 2>/dev/null)\nif echo \"$RESP\" | grep -q \"tool_calls\\|function\"; then\n    echo \"PASS (tool call detected)\"\nelif echo \"$RESP\" | grep -q \"choices\"; then\n    echo \"WARN (response\
    \ ok but no tool call - model may prefer text answer)\"\nelse\n    echo \"FAIL\"\n    echo \"$RESP\" | head -5\nfi\n\necho \"\"\necho \"=== All tests passed ===\"\necho \"Claude Code is ready. Run:\
    \ claude\"\necho \"Or use: start-claude-code\"\n"
runcmd:
- chown azureuser:azureuser /home/azureuser
- chown -R azureuser:azureuser /home/azureuser/.claude
- chown -R azureuser:azureuser /home/azureuser/benchmarks
- mkdir -p /home/azureuser/benchmarks/results
- chown -R azureuser:azureuser /home/azureuser/benchmarks/results
- bash /opt/setup-gpu.sh
- reboot
