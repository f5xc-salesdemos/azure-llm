#cloud-config
# Workstation VM — minimal bootstrap, downloads setup scripts from GitHub
# T4 GPU for Chrome/Playwright rendering only (no vLLM serving)
# LLM endpoints rendered by Terraform into /etc/profile.d/llm-endpoints.sh
package_upgrade: true
write_files:
- path: /etc/needrestart/conf.d/99-cloud-init.conf
  content: '$nrconf{restart} = ''a'';

    $nrconf{kernelhints} = 0;

    '
- path: /etc/profile.d/llm-endpoints.sh
  permissions: '0644'
  content: |
    # LLM endpoint configuration — rendered by Terraform at provision time
    export LLM_ADMIN_USER="${admin_username}"
    export HF_TOKEN="${hf_token}"
    export LARGE_LLM_BASE_URL="${large_llm_base_url}"
    export LARGE_LLM_MODEL="${large_llm_model}"
    export LARGE_LLM_CTX="${large_llm_ctx}"
    export SMALL_LLM_BASE_URL="${small_llm_base_url}"
    export SMALL_LLM_MODEL="${small_llm_model}"
    export SMALL_LLM_CTX="${small_llm_ctx}"
    export VISION_LLM_BASE_URL="${vision_llm_base_url}"
    export VISION_LLM_MODEL="${vision_llm_model}"
    export VISION_LLM_CTX="${vision_llm_ctx}"
    export MEDIUM_LLM_BASE_URL="${medium_llm_base_url}"
    export MEDIUM_LLM_MODEL="${medium_llm_model}"
    export MEDIUM_LLM_CTX="${medium_llm_ctx}"
    export FIRECRAWL_API_URL="http://localhost:3002"
    export SEARXNG_API_URL="http://localhost:8888"
    export PI_SUBAGENT_MAX_DEPTH=1
- path: /opt/setup-workstation.sh
  permissions: '0755'
  content: |
    #!/bin/bash
    set -euo pipefail
    exec > /var/log/workstation-setup.log 2>&1
    CLOUD_INIT_VERSION="2026-04-08-v12-hardened"
    echo "Cloud-init version: $${CLOUD_INIT_VERSION}"
    export DEBIAN_FRONTEND=noninteractive
    export NEEDRESTART_MODE=a

    # Source LLM endpoint env vars (rendered by Terraform)
    source /etc/profile.d/llm-endpoints.sh

    echo "=== Workstation Setup Started: $(date) ==="

    # ---- Shared retry with exponential backoff ----
    # Usage: retry_cmd <max_attempts> <initial_delay_secs> <command...>
    retry_cmd() {
        local max=$${1}; shift
        local delay=$${1}; shift
        local attempt=1
        while true; do
            echo "  [attempt $${attempt}/$${max}] $${*}"
            if "$${@}"; then
                return 0
            fi
            if (( attempt >= max )); then
                echo "  FAILED after $${max} attempts: $${*}" >&2
                return 1
            fi
            echo "  Retrying in $${delay}s..."
            sleep "$${delay}"
            delay=$((delay * 2))
            attempt=$((attempt + 1))
        done
    }
    export -f retry_cmd

    # ---- Wait for apt/dpkg locks ----
    wait_for_apt() {
        local max_wait=600 waited=0
        while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
              fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || \
              fuser /var/cache/apt/archives/lock >/dev/null 2>&1; do
            if (( waited >= max_wait )); then echo "ERROR: apt locks not released after $${max_wait}s"; return 1; fi
            echo "Waiting for apt locks... ($${waited}s)"; sleep 10; waited=$((waited + 10))
        done
    }

    # ---- Disable unattended-upgrades ----
    systemctl stop unattended-upgrades.service 2>/dev/null || true
    systemctl disable unattended-upgrades.service 2>/dev/null || true
    wait_for_apt
    apt-get remove -y unattended-upgrades 2>/dev/null || true

    # ---- Minimal bootstrap packages ----
    wait_for_apt
    retry_cmd 3 5 apt-get update -y
    retry_cmd 3 10 apt-get install -y git curl wget unzip python3-pip zsh

    # ---- GitHub CLI ----
    curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
      | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
      | tee /etc/apt/sources.list.d/github-cli.list
    apt-get update
    retry_cmd 3 10 apt-get install -y gh

    # ---- NVIDIA drivers (T4 for Chrome GPU rendering) ----
    retry_cmd 3 5 wget -q -P /tmp https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
    dpkg -i /tmp/cuda-keyring_1.1-1_all.deb
    apt-get update
    retry_cmd 3 10 apt-get install -y cuda-drivers

    # ---- Upgrade npm to latest before any scripts use it ----
    echo "Upgrading npm to latest..."
    retry_cmd 3 10 npm install -g npm@latest
    echo "npm version: $(npm --version)"

    # ---- Install pnpm globally (required by firecrawl, don't depend on tools script) ----
    echo "Installing pnpm..."
    retry_cmd 3 10 npm install -g pnpm
    echo "pnpm version: $(pnpm --version)"

    # ---- Download setup scripts from GitHub ----
    REPO_RAW="https://raw.githubusercontent.com/f5xc-salesdemos/azure-llm/main/scripts"
    SCRIPTS_DIR="/opt"
    for script in setup-workstation-tools.sh setup-workstation-shell.sh setup-workstation-agents.sh setup-workstation-firecrawl.sh; do
        echo "Downloading $${script}..."
        retry_cmd 3 5 curl -fsSL --max-time 60 \
          "$${REPO_RAW}/$${script}" -o "$${SCRIPTS_DIR}/$${script}"
        chmod +x "$${SCRIPTS_DIR}/$${script}"
    done

    # ---- Run setup scripts with retry on failure ----
    run_script() {
        local name=$${1} script=$${2}
        shift 2
        local exit_code=0
        if [ -x "$${script}" ]; then
            echo "Running $${name}..."
            bash "$${script}" "$${@}" || exit_code=$$?
            if [ "$${exit_code}" -ne 0 ]; then
                echo "RETRY: $${name} failed (exit $${exit_code}), retrying in 30s..."
                sleep 30
                bash "$${script}" "$${@}" || exit_code=$$?
                if [ "$${exit_code}" -ne 0 ]; then
                    echo "ERROR: $${name} failed after retry (exit $${exit_code})" >&2
                fi
            fi
        else
            echo "ERROR: $${script} not found or not executable" >&2
            exit_code=1
        fi
        return $${exit_code}
    }

    TOOLS_EXIT=0
    run_script "tools" "$${SCRIPTS_DIR}/setup-workstation-tools.sh" "$${LLM_ADMIN_USER}" || TOOLS_EXIT=$$?

    SHELL_EXIT=0
    run_script "shell" "$${SCRIPTS_DIR}/setup-workstation-shell.sh" || SHELL_EXIT=$$?

    AGENTS_EXIT=0
    run_script "agents" "$${SCRIPTS_DIR}/setup-workstation-agents.sh" || AGENTS_EXIT=$$?

    FIRECRAWL_EXIT=0
    run_script "firecrawl" "$${SCRIPTS_DIR}/setup-workstation-firecrawl.sh" || FIRECRAWL_EXIT=$$?

    # ---- Post-setup validation ----
    echo "=== Tool Validation Report ==="
    VALIDATION_PASS=0
    VALIDATION_FAIL=0
    for tool in zsh git curl gh nvim node npm pnpm claude opencode pi hermes fzf bat rg fd jq yq kubectl helm terraform; do
        if command -v "$${tool}" >/dev/null 2>&1; then
            echo "  [OK]   $${tool}: $(command -v $${tool})"
            VALIDATION_PASS=$(($${VALIDATION_PASS} + 1))
        else
            echo "  [MISS] $${tool}: not found"
            VALIDATION_FAIL=$(($${VALIDATION_FAIL} + 1))
        fi
    done
    echo "Validation: $${VALIDATION_PASS} present, $${VALIDATION_FAIL} missing"
    echo "=== End Tool Validation ==="

    # ---- Summary ----
    # ---- Service validation ----
    echo "=== Service Validation ==="
    for svc in redis-server rabbitmq-server postgresql searxng firecrawl-api firecrawl-playwright firecrawl-scrape-worker firecrawl-prefetch-worker firecrawl-extract-worker; do
        if systemctl is-active --quiet "$${svc}" 2>/dev/null; then
            echo "  [OK]   $${svc}: active"
        else
            echo "  [MISS] $${svc}: not active"
        fi
    done

    echo "=== Setup Exit Codes ==="
    echo "  tools=$${TOOLS_EXIT} shell=$${SHELL_EXIT} agents=$${AGENTS_EXIT} firecrawl=$${FIRECRAWL_EXIT}"
    TOTAL_FAIL=$$(($${TOOLS_EXIT} + $${SHELL_EXIT} + $${AGENTS_EXIT} + $${FIRECRAWL_EXIT}))
    if [ "$${TOTAL_FAIL}" -ne 0 ]; then
        echo "WARNING: $${TOTAL_FAIL} non-zero exit code(s)" >&2
    fi
    echo "=== Workstation Setup Completed: $(date) ==="
runcmd:
- chown ${admin_username}:${admin_username} /home/${admin_username}
- bash /opt/setup-workstation.sh
- reboot
